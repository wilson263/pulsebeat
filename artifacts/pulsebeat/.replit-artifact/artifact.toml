kind = "web"
previewPath = "/"
title = "PulseBeat"
version = "1.0.0"
id = "artifacts/pulsebeat"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 21708
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/pulsebeat run dev"

[services.env]
PORT = "21708"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/pulsebeat", "run", "build"]
publicDir = "artifacts/pulsebeat/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
