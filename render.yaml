databases:
  - name: pulsebeat-db
    plan: free
    databaseName: pulsebeat
    user: pulsebeat

services:
  # ── Backend API ──────────────────────────────────────────────────────────────
  - type: web
    name: pulsebeat-api
    runtime: node
    plan: free
    buildCommand: npm install -g pnpm@10.26.1 && pnpm install && pnpm --filter @workspace/api-server run build && pnpm --filter @workspace/db run push-force
    startCommand: node artifacts/api-server/dist/index.cjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: pulsebeat-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: VITALLENS_API_KEY
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false

  # ── Frontend Static Site ─────────────────────────────────────────────────────
  - type: web
    name: pulsebeat-frontend
    runtime: static
    buildCommand: npm install -g pnpm@10.26.1 && pnpm install && BASE_PATH=/ pnpm --filter @workspace/pulsebeat run build
    staticPublishPath: artifacts/pulsebeat/dist/public
    envVars:
      - key: VITE_API_URL
        fromService:
          name: pulsebeat-api
          type: web
          property: hostWithScheme
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
